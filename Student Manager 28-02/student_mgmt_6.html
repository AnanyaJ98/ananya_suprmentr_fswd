
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Manager</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #7b2ff7, #4facfe);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

h1 {
  color: white;
  margin-top: 30px;
}

.container {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  width: 90%;
  max-width: 500px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #6a11cb;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #2575fc;
}

.student-card {
  background: white;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.delete-btn {
  background: crimson;
}

.class-average {
  color: white;
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>
<body>

<h1>🎓 Student Manager</h1>

<div class="container">
  <input type="text" id="name" placeholder="Enter Student Name">
  <input type="text" id="marks" placeholder="Enter Marks (comma separated e.g. 80,90,75)">
  <button onclick="addStudent()">Add Student</button>
</div>

<div class="container">
  <input type="text" id="search" placeholder="Search by student name..." onkeyup="renderStudents()">
  <select id="filterGrade" onchange="renderStudents()">
    <option value="All">All Grades</option>
    <option value="A+">A+</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
    <option value="F">F</option>
  </select>
</div>

<div class="container">
  <button onclick="calculateClassAverage()">Calculate Class Average</button>
  <div id="classAverage" class="class-average" style="color: black;"></div>
</div>

<div id="studentList" style="width:90%; max-width:600px;"></div>

<script>
let students = [];

function calculateGrade(avg) {
  if (avg >= 90) return "A+";
  if (avg >= 80) return "A";
  if (avg >= 70) return "B";
  if (avg >= 60) return "C";
  if (avg >= 50) return "D";
  return "F";
}

function addStudent() {
  const name = document.getElementById("name").value;
  const marksInput = document.getElementById("marks").value;

  if (!name || !marksInput) return;

  const marksArray = marksInput.split(",").map(m => Number(m.trim()));
  const total = marksArray.reduce((a, b) => a + b, 0);
  const average = total / marksArray.length;
  const grade = calculateGrade(average);

  students.push({ name, marks: marksArray, total, average, grade });

  document.getElementById("name").value = "";
  document.getElementById("marks").value = "";

  renderStudents();
}

function deleteStudent(index) {
  students.splice(index, 1);
  renderStudents();
}

function calculateClassAverage() {
  if (students.length === 0) {
    document.getElementById("classAverage").innerText = "No students added yet.";
    return;
  }

 
  let grandTotal = 0;
  let totalSubjects = 0;

  students.forEach(student => {
    student.marks.forEach(mark => {
      if (!isNaN(mark)) {
        grandTotal += Number(mark);
        totalSubjects++;
      }
    });
  });

  if (totalSubjects === 0) {
    document.getElementById("classAverage").innerText = "Invalid marks data.";
    return;
  }

  const overallAvg = (grandTotal / totalSubjects).toFixed(2);

  document.getElementById("classAverage").innerText =
    "📊 Overall Class Average: " + overallAvg;
}

function renderStudents() {
  const search = document.getElementById("search").value.toLowerCase();
  const filterGrade = document.getElementById("filterGrade").value;
  const studentList = document.getElementById("studentList");

  studentList.innerHTML = "";

  students
    .filter(s =>
      s.name.toLowerCase().includes(search) &&
      (filterGrade === "All" || s.grade === filterGrade)
    )
    .forEach((student, index) => {
      const div = document.createElement("div");
      div.className = "student-card";
      div.innerHTML = `
        <h3>${student.name}</h3>
        <p>Marks: ${student.marks.join(", ")}</p>
        <p>Total: ${student.total}</p>
        <p>Average: ${student.average.toFixed(2)}</p>
        <p><strong>Grade: ${student.grade}</strong></p>
        <button class="delete-btn" onclick="deleteStudent(${index})">Delete</button>
      `;
      studentList.appendChild(div);
    });
}
</script>

</body>
</html>
