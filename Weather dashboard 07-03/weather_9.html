<!DOCTYPE html>
<html>
<head>
<title>Weather Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#6dd5fa,#2980b9);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:350px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
margin-bottom:20px;
color:#333;
}

input{
width:70%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
padding:10px 15px;
border:none;
background:#2980b9;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin-top:10px;
}

button:hover{
background:#1f6391;
}

#loading{
color:#007bff;
margin-top:10px;
}

#error{
color:red;
margin-top:10px;
}

.weather-box{
margin-top:20px;
background:#f7f7f7;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>Weather Dashboard</h1>

<input type="text" id="city" placeholder="Enter city name">
<br>
<button onclick="getWeather()">Get Weather</button>

<p id="loading"></p>
<p id="error"></p>

<div id="weatherResult"></div>

</div>

<script>

async function getWeather(){

const city = document.getElementById("city").value;
const loading = document.getElementById("loading");
const error = document.getElementById("error");
const result = document.getElementById("weatherResult");

loading.innerHTML="Loading...";
error.innerHTML="";
result.innerHTML="";

try{

const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`);
const geoData = await geo.json();

if(!geoData.results){
throw new Error("City not found");
}

const lat = geoData.results[0].latitude;
const lon = geoData.results[0].longitude;

const weather = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const weatherData = await weather.json();

loading.innerHTML="";

result.innerHTML = `
<div class="weather-box">
<h3>${geoData.results[0].name}</h3>
<p>Temperature: ${weatherData.current_weather.temperature} °C</p>
<p>Wind Speed: ${weatherData.current_weather.windspeed} km/h</p>
</div>
`;

}

catch(err){

loading.innerHTML="";
error.innerHTML="Unable to fetch weather data";

}

}

</script>

</body>
</html>
